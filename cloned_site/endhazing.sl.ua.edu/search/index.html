<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search - End Hazing | Grambling State University</title>
  <style>
    :root { --gold: #ECAA00; --bg: #1a1a1a; --fg: #fff; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    .wrap { max-width: 58rem; margin: 0 auto; padding: 2rem 1rem; }
    a { color: var(--gold); }
    h1 { color: var(--gold); font-size: 1.75rem; margin-top: 0; }
    .search-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .search-form input[type="search"] {
      flex: 1 1 12rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid #444;
      border-radius: 2px;
      background: #000;
      color: var(--fg);
    }
    .search-form button {
      padding: 0.5rem 1.25rem;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 2px;
      font-weight: 600;
      cursor: pointer;
    }
    .search-form button:hover { filter: brightness(1.05); }
    .meta { color: #aaa; font-size: 0.9rem; margin-bottom: 1rem; }
    .result {
      padding: 1rem 0;
      border-bottom: 1px solid #333;
    }
    .result a { font-weight: 600; text-decoration: none; }
    .result a:hover { text-decoration: underline; }
    .snippet { color: #ccc; font-size: 0.95rem; margin: 0.35rem 0 0; }
    .err { color: #f88; }
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="../index.html">← Back to home</a></p>
    <h1>Search this site</h1>
    <form class="search-form" method="get" action="index.html" role="search">
      <label class="visually-hidden" for="q">Search</label>
      <input type="search" name="s" id="q" placeholder="Search…" autocomplete="off" />
      <button type="submit">Search</button>
    </form>
    <div id="status" class="meta" aria-live="polite"></div>
    <div id="results"></div>
  </div>
  <script>
(function () {
  function encPath(rel) {
    return rel.split("/").map(encodeURIComponent).join("/");
  }
  function pageUrl(relPath) {
    return new URL("../" + encPath(relPath), location.href).href;
  }
  function escapeHtml(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
  var params = new URLSearchParams(location.search);
  var q = (params.get("s") || "").trim();
  document.getElementById("q").value = q;

  var statusEl = document.getElementById("status");
  var resultsEl = document.getElementById("results");

  if (!q) {
    statusEl.textContent = "Enter keywords and press Search (or Enter).";
    return;
  }

  statusEl.textContent = "Loading…";

  fetch(new URL("../search-index.json", location.href))
    .then(function (r) {
      if (!r.ok) throw new Error("Could not load search index.");
      return r.json();
    })
    .then(function (data) {
      var ql = q.toLowerCase();
      var words = ql.split(/\s+/).filter(function (w) { return w.length > 0; });
      var matches = data.filter(function (entry) {
        var hay = (entry.title + " " + (entry.text || "")).toLowerCase();
        return words.every(function (w) { return hay.indexOf(w) !== -1; });
      });

      statusEl.textContent = matches.length
        ? matches.length + " result(s) for “" + q + "”"
        : "No results for “" + q + "”. Try different words.";

      if (!matches.length) {
        resultsEl.innerHTML = "";
        return;
      }

      resultsEl.innerHTML = matches
        .map(function (e) {
          var snip = (e.text || "").slice(0, 220);
          if ((e.text || "").length > 220) snip += "…";
          return (
            '<article class="result">' +
            '<a href="' + escapeHtml(pageUrl(e.path)) + '">' +
            escapeHtml(e.title) +
            "</a>" +
            '<p class="snippet">' +
            escapeHtml(snip) +
            "</p>" +
            "</article>"
          );
        })
        .join("");
    })
    .catch(function (e) {
      statusEl.innerHTML = '<span class="err">' + escapeHtml(e.message) + "</span>";
      resultsEl.innerHTML = "";
    });
})();
  </script>
</body>
</html>
